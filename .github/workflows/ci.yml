name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  checks:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Linting (Ruff)
        run: uv run ruff check

      - name: Type Checking (Pyrefly)
        run: uv run pyrefly check

      - name: Unit Tests (Pytest)
        env:
          NO_COLOR: "1"
        run: uv run meeting-pipeline-test

  build-and-push:
    name: Build & Push (${{ matrix.image-type }})
    needs: checks
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image-type: cpu
            install-cuda: "false"
            tag-suffix: "cpu"
            is-default: true
          - image-type: gpu
            install-cuda: "true"
            tag-suffix: "gpu"
            is-default: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.tag-suffix }}
            type=raw,value=${{ matrix.tag-suffix }}-${{ github.sha }}
            type=ref,event=branch,suffix=-${{ matrix.tag-suffix }}
            type=ref,event=tag,suffix=-${{ matrix.tag-suffix }}
            type=raw,value=latest,enable=${{ matrix.is-default && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            INSTALL_CUDA=${{ matrix.install-cuda }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image-type }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image-type }}
