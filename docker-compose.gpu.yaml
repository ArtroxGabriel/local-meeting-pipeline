# GPU override configuration for Docker Compose
# Run with: docker compose -f docker-compose.yaml -f docker-compose.gpu.yaml up --exit-code-from app --abort-on-container-exit
services:
  app:
    image: ghcr.io/artroxgabriel/local-meeting-pipeline:gpu
    build:
      context: .
      args:
        INSTALL_CUDA: "true"
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    environment:
      - ENABLE_GPU=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
